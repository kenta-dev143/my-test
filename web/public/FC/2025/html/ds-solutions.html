      color: #0073e6;
      border: 2px solid #0073e6;
      border-radius: 5px;
      padding: 10px 20px;
    }

    .pdf-link:hover {
      background: #0073e6;
      color: white;
    }

    .pdf-viewer {
      margin-top: 20px;
    }

    .pdf-viewer object {
      display: block;
      margin: 0 auto 20px;
      border: 1px solid #ddd;
      border-radius: 5px;

      margin-top: 20px;
      padding: 10px;
      color: #555;
      background: #f0f0f0;
      border-top: 1px solid #ddd;
    }

    footer a {
      text-decoration: none;
      color: #005bac;
    }

    footer a:hover {
      text-decoration: underline;
    }
