    /* 配色: アクセスブルーとアクセスグリーン */
    body {
      font-family: 'Arial', sans-serif;

      color: #333;
    }

    header {
      background: linear-gradient(45deg, #005bac, #0073e6);
      color: white;
      text-align: center;
      padding: 20px 0;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      font-size: 24px;
      margin: 0;
    }

    header p {
      font-size: 14px;
      margin-top: 5px;
    }

    .container {
      margin: 20px auto;
      padding: 20px;
      background: white;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      text-align: center;
    }

    .container h2 {
      font-size: 20px;
      color: #005bac;
      margin-bottom: 20px;
    }

    .pdf-link {
      display: inline-block;
      margin: 15px 0;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      color: #0073e6;
      border: 2px solid #0073e6;
      border-radius: 5px;
      padding: 10px 20px;
    }

    .pdf-link:hover {
      background: #0073e6;
      color: white;
    }

    .pdf-viewer {
      margin-top: 20px;
    }

    .pdf-viewer object {
      display: block;
      margin: 0 auto 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
      width: 70%; /* 高さ調整 */
    }

    @media screen and (max-width: 768px) {
      .pdf-viewer object {
        width: 90%; /* スマホでの高さ調整 */
      }
    }

    footer {
      text-align: center;
      font-size: 14px;
      margin-top: 20px;
      padding: 10px;
      color: #555;
      background: #f0f0f0;
      border-top: 1px solid #ddd;
    }

    footer a {
      text-decoration: none;
      color: #005bac;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
