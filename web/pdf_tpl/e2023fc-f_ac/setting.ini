;******************************************************************************************************
; 帳票全般設定
;******************************************************************************************************
[SETTING]

;*** タイトル
title=ご来場者カード

;*** 用紙の向き(P=縦, L=横)
orientation=P


;デバッグ用（全項目に枠線が付き、赤フォントで、ページ上部にルーラーが出る）
;debug=1

;******************************************************************************************************
; テンプレート設定
;******************************************************************************************************
;★★★★★★★★★★★★★★★★★★★★★
; テンプレ1
;★★★★★★★★★★★★★★★★★★★★★
[TEMPLATE_1]
;*** テンプレートファイル名
tpl_name=tpl.pdf

;*** 綴りページ数（３枚綴りなら「3」を指定）
pages=1

;*** リスト系かどうか(リスト系：yes、単票系：no） ※単票の３枚綴りなどは「no」とし、pagesで綴り枚数を指定する
list=no

;*** リスト系の場合１ページ内の行数
rows=1

;*** リスト系の場合１行あたりの高さ
height=1



